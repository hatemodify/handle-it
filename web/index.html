<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>handle-it</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app" id="app">
    <!-- Header -->
    <header class="header">
      <a href="#/" class="header-title" style="text-decoration: none;">
        <span>handle-it</span>
      </a>
      <div class="header-actions">
        <div class="connection-status" id="connection-status">
          <div class="connection-dot" id="connection-dot"></div>
          <span id="connection-text">Connecting...</span>
        </div>
        <button class="btn" onclick="app.showImportModal()">Import Project</button>
        <button class="btn btn-primary" id="btn-new-pipeline" onclick="app.showNewPipelineModal()">+ New Pipeline</button>
      </div>
    </header>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Pipelines</div>
        <div id="team-list">
          <div style="padding: 16px; color: var(--text-dim); font-size: 12px;">Loading...</div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main" id="main-content">
      <div class="empty-state">
        <div class="empty-state-icon">&#128640;</div>
        <div class="empty-state-text">Select a pipeline or start a new one</div>
        <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 20px;">
          Describe your idea and handle-it will generate a complete project with PRD, architecture, code, tests, and a PR.
        </p>
        <div style="display: flex; gap: 8px; justify-content: center;">
          <button class="btn" onclick="app.showImportModal()">Import Project</button>
          <button class="btn btn-primary" onclick="app.showNewPipelineModal()">+ New Pipeline</button>
        </div>
      </div>
    </main>
  </div>

  <!-- New Pipeline Modal -->
  <div class="modal-overlay" id="modal-new-pipeline" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">New Pipeline</div>
        <button class="modal-close" onclick="app.hideNewPipelineModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="input-name">Project Name</label>
          <input class="form-input" id="input-name" type="text" placeholder="my-diary-app">
        </div>
        <div class="form-group">
          <label class="form-label" for="input-idea">Idea</label>
          <textarea class="form-textarea" id="input-idea" placeholder="AI diary app with sentiment analysis and dark mode..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="input-project-dir">Output Directory (optional)</label>
          <input class="form-input" id="input-project-dir" type="text" placeholder="~/projects/my-app">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="app.hideNewPipelineModal()">Cancel</button>
        <button class="btn btn-primary" id="btn-start" onclick="app.startPipeline()">Create</button>
      </div>
    </div>
  </div>

  <!-- Import Project Modal -->
  <div class="modal-overlay" id="modal-import" style="display: none;">
    <div class="modal" style="width: 560px;">
      <div class="modal-header">
        <div class="modal-title">Import Project</div>
        <button class="modal-close" onclick="app.hideImportModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="input-import-name">Project Name</label>
          <input class="form-input" id="input-import-name" type="text" placeholder="my-app-darkmode">
        </div>
        <div class="form-group">
          <label class="form-label">Project Folder</label>
          <div class="folder-picker">
            <div class="folder-picker-selected" id="folder-picker-selected">
              <span class="folder-picker-placeholder">Select a project folder...</span>
            </div>
            <button class="btn btn-sm" onclick="app.openFolderBrowser()">Browse</button>
          </div>
          <input type="hidden" id="input-import-dir">
          <div id="folder-browser" class="folder-browser" style="display: none;">
            <div class="folder-browser-bar">
              <button class="btn btn-sm" onclick="app.folderBrowserUp()" id="folder-browser-up">&#8593; Up</button>
              <div class="folder-browser-path" id="folder-browser-path"></div>
            </div>
            <div class="folder-browser-list" id="folder-browser-list"></div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="input-import-prompt">What do you want to change?</label>
          <textarea class="form-textarea" id="input-import-prompt" rows="4" placeholder="Add dark mode support&#10;Refactor authentication to use JWT&#10;Add Korean language i18n..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="app.hideImportModal()">Cancel</button>
        <button class="btn btn-primary" id="btn-import-start" onclick="app.startImport()">Start Modify</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
